services:
  # ── Main Encore.ts Application ─────────────────────────────────────────────
  # ── InsightFace Service (Face Detection) ───────────────────────────────────
  insightface:
    ports:
      - "8000:8000"
    image: ghcr.io/as19git67/fk-encore-insightface:latest
    container_name: fk-encore-insightface
    restart: unless-stopped
    environment:
      ORT_LOGGING_LEVEL: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Embedding Service (CLIP + DINOv2) ──────────────────────────────────────
  embedding_service:
    ports:
      - "8001:8000"
    image: ghcr.io/as19git67/fk-encore-embedding:latest
    container_name: fk-encore-embedding
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/embeddings
      CLIP_MODEL_NAME: xlm-roberta-large-ViT-H-14
      CLIP_PRETRAINED: frozen_laion5b_s13b_b90k
      DINO_MODEL_NAME: facebook/dinov2-base
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Landmark Detection Service (Grounding DINO) ────────────────────────────
  landmark:
    image: ghcr.io/as19git67/fk-encore-landmark:latest
    container_name: fk-encore-landmark
    restart: unless-stopped
    environment:
      LANDMARK_THRESHOLD: "0.35"
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── PostgreSQL (shared instance for both app and embedding service) ─────────
  postgres:
    image: pgvector/pgvector:pg18
    container_name: fk-encore-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encore          # primary database for the app
    volumes:
      - fk_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d encore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fk_pgdata:
    driver: local
    driver_opts:
      device: /Users/anton/fk-encore_data/pgdata
      o: bind
      type: none
