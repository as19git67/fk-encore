# Test-Umgebung: verwendet den 'test'-Tag (gebaut aus PRs)
# Auf TrueNAS in einem separaten Verzeichnis ablegen, z. B. /mnt/data/fk-encore-test/
# Eigene .env-Datei mit TEST-spezifischen Werten anlegen.

services:
  app:
    image: ghcr.io/as19git67/fk-encore:test
    container_name: fk-encore-app-test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      insightface:
        condition: service_healthy
      embedding_service:
        condition: service_healthy
      landmark:
        condition: service_healthy
    ports:
      - "8081:8080"       # anderer Host-Port als Produktion
    environment:
      PORT: "8080"
      DB_TYPE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: encore_test
      PHOTO_UPLOAD_DIR: /mnt/data/photos
      ADMIN_EMAIL: admin@example.com
      ADMIN_NAME: Admin
      ADMIN_PASSWORD: changeme
      RP_ID: localhost
      RP_NAME: Vivanty App (Test)
      RP_ORIGIN: http://localhost:8081
      ENABLE_LOCAL_FACES: "true"
      FACE_DISTANCE_THRESHOLD: "0.42"
      INSIGHTFACE_SERVICE_URL: http://insightface:8000
      EMBEDDING_SERVICE_URL: http://embedding_service:8000
      LANDMARK_SERVICE_URL: http://landmark:8000
      ENABLE_LANDMARKS: "true"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      APP_URL: ${APP_URL:-http://localhost:8081}
    volumes:
      - photos:/mnt/data/photos
      - thumbnails:/mnt/data/thumbnails

  insightface:
    image: ghcr.io/as19git67/fk-encore-insightface:latest
    container_name: fk-encore-insightface-test
    restart: unless-stopped
    environment:
      ORT_LOGGING_LEVEL: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  embedding_service:
    image: ghcr.io/as19git67/fk-encore-embedding:latest
    container_name: fk-encore-embedding-test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/embeddings_test
      CLIP_MODEL_NAME: xlm-roberta-large-ViT-H-14
      CLIP_PRETRAINED: frozen_laion5b_s13b_b90k
      DINO_MODEL_NAME: facebook/dinov2-base
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  landmark:
    image: ghcr.io/as19git67/fk-encore-landmark:latest
    container_name: fk-encore-landmark-test
    restart: unless-stopped
    environment:
      LANDMARK_THRESHOLD: "0.35"
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  postgres:
    image: pgvector/pgvector:pg18
    container_name: fk-encore-db-test
    restart: unless-stopped
    ports:
      - "5433:5432"       # anderer Host-Port als Produktion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encore_test
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d encore_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Watchtower (Port 9001 — separater Endpunkt vom Produktions-Watchtower) ───
  watchtower:
    image: containrrr/watchtower
    container_name: fk-encore-watchtower-test
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    command: >
      --http-api-periodic-polls
      fk-encore-app-test
      fk-encore-insightface-test
      fk-encore-embedding-test
      fk-encore-landmark-test
    ports:
      - "9001:8080"

volumes:
  photos:
    driver: local
    driver_opts:
      device: /mnt/data/fk-encore-test/photos
      o: bind
      type: none
  thumbnails:
    driver: local
    driver_opts:
      device: /mnt/data/fk-encore-test/thumbnails
      o: bind
      type: none
  pgdata:
    driver: local
    driver_opts:
      device: /mnt/data/fk-encore-test/pgdata
      o: bind
      type: none
