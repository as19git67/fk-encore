services:
  # ── Main Encore.ts Application ─────────────────────────────────────────────
  app:
    image: ghcr.io/as19git67/fk-encore:latest
    container_name: fk-encore-app
    restart: unless-stopped
    depends_on:
      insightface:
        condition: service_started
      embedding_service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_TYPE: sqlite
      SQLITE_DB_PATH: /mnt/data/db/app.db
      PHOTO_UPLOAD_DIR: /mnt/data/photos
      ADMIN_EMAIL: admin@example.com
      ADMIN_NAME: Admin
      ADMIN_PASSWORD: changeme   # <-- hier anpassen!
      RP_ID: localhost
      RP_NAME: Vivanty App
      RP_ORIGIN: http://localhost:8080
      ENABLE_LOCAL_FACES: "true"
      FACE_DISTANCE_THRESHOLD: "0.42"
      INSIGHTFACE_SERVICE_URL: http://insightface:8000
      EMBEDDING_SERVICE_URL: http://embedding_service:8000
    volumes:
      - photos:/mnt/data/photos
      - db:/mnt/data/db

  # ── InsightFace Service (Face Detection) ───────────────────────────────────
  insightface:
    image: ghcr.io/as19git67/fk-encore-insightface:latest
    container_name: fk-encore-insightface
    restart: unless-stopped
    environment:
      ORT_LOGGING_LEVEL: "3"

  # ── Embedding Service (CLIP + DINOv2) ──────────────────────────────────────
  embedding_service:
    image: ghcr.io/as19git67/fk-encore-embedding:latest
    container_name: fk-encore-embedding
    restart: unless-stopped
    depends_on:
      embedding_postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@embedding_postgres:5432/embeddings
      CLIP_MODEL_NAME: ViT-B-32
      CLIP_PRETRAINED: openai
      DINO_MODEL_NAME: facebook/dinov2-base
      LOG_LEVEL: INFO

  # ── PostgreSQL for Embedding Service (pgvector) ────────────────────────────
  embedding_postgres:
    image: pgvector/pgvector:pg16
    container_name: fk-encore-embedding-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: embeddings
    volumes:
      - embedding-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  photos:
    driver: local
    driver_opts:
      device: /mnt/data/vivanty/photos
      o: bind
      type: none
  db:
    driver: local
    driver_opts:
      device: /mnt/data/vivanty/db
      o: bind
      type: none
  embedding-pgdata:
    driver: local
    driver_opts:
      device: /mnt/data/vivanty/embedding-pgdata
      o: bind
      type: none
