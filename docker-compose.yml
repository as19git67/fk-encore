services:
  # ── Main Encore.ts Application ─────────────────────────────────────────────
  app:
    image: ghcr.io/as19git67/fk-encore:latest
    container_name: fk-encore-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      insightface:
        condition: service_healthy
      embedding_service:
        condition: service_healthy
      landmark:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_TYPE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: encore
      PHOTO_UPLOAD_DIR: /mnt/data/photos
      ADMIN_EMAIL: admin@example.com
      ADMIN_NAME: Admin
      ADMIN_PASSWORD: changeme   # <-- hier anpassen!
      RP_ID: localhost
      RP_NAME: Vivanty App
      RP_ORIGIN: http://localhost:8080
      ENABLE_LOCAL_FACES: "true"
      FACE_DISTANCE_THRESHOLD: "0.42"
      INSIGHTFACE_SERVICE_URL: http://insightface:8000
      EMBEDDING_SERVICE_URL: http://embedding_service:8000
      LANDMARK_SERVICE_URL: http://landmark:8000
      ENABLE_LANDMARKS: "true"
    volumes:
      - photos:/mnt/data/photos

  # ── InsightFace Service (Face Detection) ───────────────────────────────────
  insightface:
    image: ghcr.io/as19git67/fk-encore-insightface:latest
    container_name: fk-encore-insightface
    restart: unless-stopped
    environment:
      ORT_LOGGING_LEVEL: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Embedding Service (CLIP + DINOv2) ──────────────────────────────────────
  embedding_service:
    image: ghcr.io/as19git67/fk-encore-embedding:latest
    container_name: fk-encore-embedding
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/embeddings
      CLIP_MODEL_NAME: xlm-roberta-large-ViT-H-14
      CLIP_PRETRAINED: frozen_laion5b_s13b_b90k
      DINO_MODEL_NAME: facebook/dinov2-base
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Landmark Detection Service (Grounding DINO) ────────────────────────────
  landmark:
    image: ghcr.io/as19git67/fk-encore-landmark:latest
    container_name: fk-encore-landmark
    restart: unless-stopped
    environment:
      LANDMARK_THRESHOLD: "0.35"
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── PostgreSQL (shared instance for both app and embedding service) ─────────
  postgres:
    image: pgvector/pgvector:pg18
    container_name: fk-encore-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encore          # primary database for the app
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d encore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  photos:
    driver: local
    driver_opts:
      device: /Users/anton/vivanty_data/photos
      o: bind
      type: none
  pgdata:
    driver: local
    driver_opts:
      device: /Users/anton/vivanty_data/pgdata
      o: bind
      type: none
