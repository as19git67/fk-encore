version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: embedding_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: embeddings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  embedding_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedding_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/embeddings
      CLIP_MODEL_NAME: ViT-B-32
      CLIP_PRETRAINED: openai
      DINO_MODEL_NAME: facebook/dinov2-base
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      # Mount your photo storage so the service can read image files
      - /photos:/photos:ro

volumes:
  pgdata:
